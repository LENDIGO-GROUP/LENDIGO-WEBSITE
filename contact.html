<!-- ✅ CONTACT FORM CARD -->
<section style="display:flex; justify-content:center; padding:40px;">

  <div style="
    background:#ffffff;
    max-width:600px;
    width:100%;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    border-top:5px solid #2e7d32;
  ">

    <h2 style="color:#2e7d32; text-align:center;">Send Us a Message</h2>

    <form id="contactForm">

      <label>Full Name</label>
      <input type="text" id="cname" required>

      <label>Phone Number</label>
      <input type="text" id="cphone" required>

      <label>Email</label>
      <input type="email" id="cemail" required>

      <label>Message</label>
      <textarea id="cmessage" rows="4" required></textarea>

      <button type="submit" style="
        background:#2e7d32;
        color:#fff;
        padding:12px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        margin-top:10px;
        width:100%;
        font-weight:600;
      ">Submit</button>

    </form>

    <p id="formMsg" style="margin-top:10px; text-align:center;"></p>

  </div>

</section>

<script>
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();

  var name = document.getElementById("cname").value.trim();
  var phone = document.getElementById("cphone").value.trim();
  var email = document.getElementById("cemail").value.trim();
  var message = document.getElementById("cmessage").value.trim();

  var msgBox = document.getElementById("formMsg");

  // ✅ Simple validation
  if(name.length < 3){
    msgBox.style.color = "red";
    msgBox.innerHTML = "Please enter a valid name.";
    return;
  }

  if(phone.length < 10){
    msgBox.style.color = "red";
    msgBox.innerHTML = "Please enter a valid phone number.";
    return;
  }

  if(!email.includes("@")){
    msgBox.style.color = "red";
    msgBox.innerHTML = "Please enter a valid email address.";
    return;
  }

  if(message.length < 5){
    msgBox.style.color = "red";
    msgBox.innerHTML = "Message is too short.";
    return;
  }

  // ✅ Success
  msgBox.style.color = "green";
  msgBox.innerHTML = "Message ready to send! Choose option below.";

  // ✅ Open WhatsApp with message
  var text = "Contact Request:%0AName: " + name +
             "%0APhone: " + phone +
             "%0AEmail: " + email +
             "%0AMessage: " + message;

  window.open("https://wa.me/256704679882?text=" + text, "_blank");

});
</script>
