
<!DOCTYPE html><html><head><link rel='stylesheet' href='style.css'><title>Apply</title>
<script>
function showModal(msg){
 document.getElementById('overlay').style.display='block';
 document.getElementById('modal').style.display='block';
 document.getElementById('summary').innerHTML=msg.replace(/%0A/g,'<br>');
}
function closeModal(){document.getElementById('overlay').style.display='none';document.getElementById('modal').style.display='none';}
function submitLoanForm(){
 var n=document.getElementById('name').value;
 var p=document.getElementById('phone').value;
 var e=document.getElementById('email').value;
 var t=document.getElementById('type').value;
 var a=document.getElementById('amount').value;
 var msg='New Loan Application:%0AName: '+n+'%0APhone: '+p+'%0AEmail: '+e+'%0ALoan Type: '+t+'%0AAmount: '+a;
 showModal(msg);
}
</script>
</head><body>

<header>
<img src='logo.JPG' class='logo-circle'>
<nav>
 <a href='index.html'>Home</a>
 <a href='products.html'>Products</a>
 <a href='apply.html'>Apply</a>
 <a href='about.html'>About</a>
 <a href='team.html'>Team</a>
 <a href='contact.html'>Contact</a>
</nav>
</header>

<h1 class='fade-in'>Apply for a Loan</h1>
<form class='apply-form fade-in' onsubmit='event.preventDefault();submitLoanForm();'>
<label>Name</label><input id='name' required>
<label>Phone</label><input id='phone' required>
<label>Email</label><input id='email'>
<label>Loan Type</label>
<select id='type'>
<option>Salary Loans</option><option>Logbook Loans</option><option>LPO Financing</option><option>Business Loans</option><option>Personal Loans</option><option>Study Loans</option>
</select>
<label>Amount</label><input id='amount' type='number' required>
<button class='btn'>Submit</button>
</form>
<div id='overlay' class='overlay'></div>
<div id='modal' class='modal'>
 <h2>Almost Done! Choose How to Send</h2>
 <p id='summary'></p>
 <button class='btn whats' onclick="window.open('https://wa.me/256704679882?text='+document.getElementById('summary').innerText,'_blank');">WhatsApp</button>
 <button class='btn emailbtn' onclick="window.open('mailto:mn.wewoolefinancialservices@gmail.com?subject=New Loan Application&body='+document.getElementById('summary').innerText,'_blank');">Email</button>
 <button class='btn closebtn' onclick='closeModal()'>Close</button>
</div>

<div class='fab-container'>
 <a class='fab whatsapp' href='https://wa.me/256704679882?text=Hello%20LENDIGO' target='_blank'><img src='https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg'></a>
 <a class='fab call' href='tel:+256704679882'><img src='https://cdn-icons-png.flaticon.com/512/597/597177.png'></a>
 <a class='fab email' href='mailto:mn.wewoolefinancialservices@gmail.com?subject=Loan%20Inquiry'><img src='https://cdn-icons-png.flaticon.com/512/561/561127.png'></a>
</div>

</body></html>
