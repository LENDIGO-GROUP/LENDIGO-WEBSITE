
<!DOCTYPE html>

<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<link rel='stylesheet' href='style.css'>
<title>LENDIGO</title>
<script>
function submitLoanForm() {
  var name = document.getElementById('name').value;
  var phone = document.getElementById('phone').value;
  var email = document.getElementById('email').value;
  var type = document.getElementById('type').value;
  var amount = document.getElementById('amount').value;

  var msg = 'New Loan Application:%0A' +
            'Name: ' + name + '%0A' +
            'Phone: ' + phone + '%0A' +
            'Email: ' + email + '%0A' +
            'Loan Type: ' + type + '%0A' +
            'Amount: ' + amount;

  window.open('mailto:mn.wewoolefinancialservices@gmail.com?subject=New Loan Application&body=' + msg);
  window.open('https://wa.me/256704679882?text=' + msg);
  alert('Your application has been submitted!');
}
</script>
</head>
<body>
<header>
    <img src='logo.JPG' class='logo'>
    <nav>
        <a href='index.html'>Home</a>
        <a href='products.html'>Products</a>
        <a href='apply.html'>Apply</a>
        <a href='about.html'>About</a>
        <a href='contact.html'>Contact</a>
    </nav>
</header>

<h1>Apply for a Loan</h1>
<form class='apply-form' onsubmit='event.preventDefault();submitLoanForm();'>
<label>Name</label><input id='name' type='text' required>
<label>Phone</label><input id='phone' type='text' required>
<label>Email</label><input id='email' type='email'>
<label>Loan Type</label>
<select id='type' required>
<option>Salary Loans</option>
<option>Logbook Loans</option>
<option>LPO Financing</option>
<option>Business Loans</option>
<option>Personal Loans</option>
<option>Study Loans</option>
</select>
<label>Amount</label><input id='amount' type='number' required>
<button class='btn'>Submit</button>
</form>
